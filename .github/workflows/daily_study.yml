name: Daily Book Study

on:
  schedule:
    - cron: '30 5 * * *' # 11:00 AM IST
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # CRITICAL: Allows GitHub to save your progress

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install google-genai requests

      - name: Run Study Agent
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python agent.py

      - name: Save Progress to Repository
        run: |
          git config --global user.name 'Study-Bot'
          git config --global user.email 'bot@github.com'
          git add progress.txt day_*.txt
          git commit -m "Update progress [skip ci]" || echo "No changes"
          git push
